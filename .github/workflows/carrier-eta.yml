name: Carrier ETA refresh

# Polls 17TRACK for shipped orders' tracking numbers and writes live
# ETAs/status into Firebase RTDB (manifest/{uid}/carrier/...), which the
# app subscribes to. See scripts/carrier-eta.mjs and README → "Live
# carrier ETAs" for the required secrets.

on:
  schedule:
    - cron: "23 3,9,15,21 * * *" # every 6 hours (offset to avoid GH's busy :00)
  workflow_dispatch: # manual "run now" from the Actions tab
  repository_dispatch:
    types: [carrier-eta] # near-realtime trigger (Shippo webhook → cloud/relay)

# Shippo's webhook fires once per tracking EVENT, so a package sweeping
# through a sort facility can burst several dispatches in a minute. Queue
# them into at most one follow-up run instead of racing Firebase writes.
concurrency:
  group: carrier-eta
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-save firebase-admin@^12

      - run: node scripts/carrier-eta.mjs
        env:
          # Secrets (Settings → Secrets and variables → Actions → Secrets).
          # RECOMMENDED: Shippo — $0.01 per unique tracking number, API
          # access on the free plan, sane signup:
          SHIPPO_KEY: ${{ secrets.SHIPPO_KEY }}
          # Alternative: EasyPost — $0.02–0.03 per tracker:
          EASYPOST_KEY: ${{ secrets.EASYPOST_KEY }}
          # Alternative: direct carrier APIs (free, but painful signup):
          UPS_CLIENT_ID: ${{ secrets.UPS_CLIENT_ID }}
          UPS_CLIENT_SECRET: ${{ secrets.UPS_CLIENT_SECRET }}
          USPS_CLIENT_ID: ${{ secrets.USPS_CLIENT_ID }}
          USPS_CLIENT_SECRET: ${{ secrets.USPS_CLIENT_SECRET }}
          # Optional fallback for carriers other than UPS/USPS:
          SHIP24_KEY: ${{ secrets.SHIP24_KEY }}
          SEVENTEEN_TRACK_KEY: ${{ secrets.SEVENTEEN_TRACK_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # Reuses the existing repo Variable from the Pages deploy:
          FIREBASE_DATABASE_URL: ${{ vars.VITE_FIREBASE_DATABASE_URL }}
